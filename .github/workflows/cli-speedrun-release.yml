name: Release cli-speedrun

on:
  push:
    tags: ['cli-speedrun-v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: cli-speedrun-linux-x64
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            artifact: cli-speedrun-linux-arm64
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            artifact: cli-speedrun-macos-x64
            os: macos-latest
          - target: aarch64-apple-darwin
            artifact: cli-speedrun-macos-arm64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli-speedrun

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        working-directory: cli-speedrun
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp cli-speedrun/target/${{ matrix.target }}/release/cli-speedrun ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: bssm-oss/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Compute sha256 and update formula
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release download $TAG --repo bssm-oss/shitty-justn --dir /tmp/assets

          SHA_MACOS_ARM64=$(shasum -a 256 /tmp/assets/cli-speedrun-macos-arm64 | awk '{print $1}')
          SHA_MACOS_X64=$(shasum -a 256 /tmp/assets/cli-speedrun-macos-x64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(shasum -a 256 /tmp/assets/cli-speedrun-linux-arm64 | awk '{print $1}')
          SHA_LINUX_X64=$(shasum -a 256 /tmp/assets/cli-speedrun-linux-x64 | awk '{print $1}')

          cd homebrew-tap
          python3 scripts/update-formula.py cli-speedrun.rb $TAG \
            cli-speedrun-macos-arm64=$SHA_MACOS_ARM64 \
            cli-speedrun-macos-x64=$SHA_MACOS_X64 \
            cli-speedrun-linux-arm64=$SHA_LINUX_ARM64 \
            cli-speedrun-linux-x64=$SHA_LINUX_X64

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli-speedrun.rb
          git diff --staged --quiet || git commit -m "chore: bump cli-speedrun to $TAG"
          git push

  publish-crates:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --manifest-path cli-speedrun/Cargo.toml --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
