name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: cli-speedrun-linux-x64
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            artifact: cli-speedrun-linux-arm64
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            artifact: cli-speedrun-macos-x64
            os: macos-latest
          - target: aarch64-apple-darwin
            artifact: cli-speedrun-macos-arm64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/cli-speedrun ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: bssm-oss/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Compute sha256 and update formula
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION=${TAG#v}
          gh release download $TAG --repo bssm-oss/cli-speedrun --dir /tmp/assets

          SHA_MACOS_ARM64=$(shasum -a 256 /tmp/assets/cli-speedrun-macos-arm64 | awk '{print $1}')
          SHA_MACOS_X64=$(shasum -a 256 /tmp/assets/cli-speedrun-macos-x64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(shasum -a 256 /tmp/assets/cli-speedrun-linux-arm64 | awk '{print $1}')
          SHA_LINUX_X64=$(shasum -a 256 /tmp/assets/cli-speedrun-linux-x64 | awk '{print $1}')

          cd homebrew-tap
          python3 scripts/update-formula.py cli-speedrun.rb $VERSION \
            cli-speedrun-macos-arm64=$SHA_MACOS_ARM64 \
            cli-speedrun-macos-x64=$SHA_MACOS_X64 \
            cli-speedrun-linux-arm64=$SHA_LINUX_ARM64 \
            cli-speedrun-linux-x64=$SHA_LINUX_X64

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli-speedrun.rb
          git diff --staged --quiet || git commit -m "chore: bump cli-speedrun to v$VERSION"
          git push

  publish-crates:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
