name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -project daybar.xcodeproj \
            -scheme daybar \
            -configuration Release \
            build \
            -derivedDataPath ./build

      - name: Package DMG
        run: |
          hdiutil create \
            -volname daybar \
            -srcfolder build/Build/Products/Release/daybar.app \
            -ov -format UDZO \
            daybar-${{ github.ref_name }}.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: daybar-*.dmg
          generate_release_notes: true
